name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            if [ ! -d ~/nginx-global-docker ]; then
              git clone git@github.com:${{ github.repository }}.git ~/nginx-global-docker
            else
              cd ~/nginx-global-docker && git pull origin main
            fi
            cd ~/nginx-global-docker

            cat > .env <<EOF
            CERTBOT_EMAIL=${{ secrets.CERTBOT_EMAIL }}
            RESUMEFORGEDOMAIN=${{ secrets.RESUMEFORGEDOMAIN }}
            RESUMEFORGEPORT=${{ secrets.RESUMEFORGEPORT }}
            EOF

            docker compose pull
            docker compose up -d
